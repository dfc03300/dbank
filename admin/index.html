<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>D-Bank Admin</title>

<style>
body { font-family: sans-serif; }

/* ===== 기존 스타일 일부 ===== */
.form-label {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 6px;
}

.form-label-lg {
  font-size: 18px;
  font-weight: 700;
}

.form-hint {
  font-size: 12px;
  color: #aaa;
}

.form-input {
  width: 100%;
  height: 44px;
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 0 12px;
}

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal {
  background: #fff;
  border-radius: 16px;
  width: 520px;
}

.modal-header {
  padding: 20px;
  border-bottom: 1px solid #eee;
}

.modal-title {
  font-size: 20px;
  font-weight: 700;
}

.modal-body {
  padding: 20px;
}

.modal-footer {
  padding: 20px;
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

/* ===== 조직 선택 UI ===== */
.org-col-title {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 10px;
}

.org-panel {
  border: 1px solid #ddd;
  border-radius: 8px;
  height: 300px;
  overflow-y: auto;
  padding: 10px;
}

.org-item {
  padding: 6px;
  cursor: pointer;
}

.org-item.active {
  background: #eee;
}

button {
  padding: 8px 14px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.primary {
  background: #2563eb;
  color: white;
}

</style>
</head>

<body>

<button onclick="openModal('modal-create')">계정 추가</button>

<!-- ===== 계정 추가 ===== -->
<div id="modal-create" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">계정 추가</div>
    </div>

    <div class="modal-body">

      <!-- 아이디 -->
      <div class="form-label form-label-lg">아이디 *</div>
      <input class="form-input" placeholder="영문 소문자로 시작, 6~20자">
      <div class="form-hint">영문 소문자·숫자 사용</div>

      <br>

      <!-- 조직 검색 -->
      <div class="form-label form-label-lg">조직 검색 *</div>
      <input
        class="form-input"
        readonly
        onclick="openModal('modal-org')"
      >

    </div>

    <div class="modal-footer">
      <button onclick="closeModal('modal-create')">취소</button>
      <button class="primary">추가</button>
    </div>
  </div>
</div>

<!-- ===== 조직 선택 ===== -->
<div id="modal-org" class="modal-overlay">
  <div class="modal" style="width: 1200px;">

    <div class="modal-header">
      <div class="modal-title">조직 검색</div>
    </div>

    <div class="modal-body">

      <div style="display:grid; grid-template-columns: repeat(5,1fr); gap:10px;">

        <div>
          <div class="org-col-title">본부</div>
          <div class="org-panel">
            <div class="org-item active">대교 서울서북본부</div>
            <div class="org-item">대교 서울강원본부</div>
          </div>
        </div>

        <div>
          <div class="org-col-title">교육국</div>
          <div class="org-panel">
            <div class="org-item active">대교 일산동부 Hive</div>
          </div>
        </div>

        <div>
          <div class="org-col-title">팀</div>
          <div class="org-panel">
            <div class="org-item active">001</div>
          </div>
        </div>

        <div>
          <div class="org-col-title">채널</div>
          <div class="org-panel">
            <div class="org-item active">[YC]호수백신</div>
          </div>
        </div>

        <div>
          <div class="org-col-title">선생님</div>
          <div class="org-panel">
            <div class="org-item">김진경</div>
            <div class="org-item">정호선</div>
          </div>
        </div>

      </div>

    </div>

    <div class="modal-footer">
      <button onclick="closeModal('modal-org')">취소</button>
      <button class="primary" onclick="applyOrg()">확인</button>
    </div>

  </div>
</div>

<script>
function openModal(id){
  document.getElementById(id).style.display = 'flex';
}

function closeModal(id){
  document.getElementById(id).style.display = 'none';
}

function applyOrg(){
  alert('조직 선택 완료');
  closeModal('modal-org');
}
</script>

</body>
</html>
